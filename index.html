<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paisajes Urbanos y Rurales</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; padding: 20px; background: #fff; }
    h1 { text-align: center; margin-bottom: 20px; font-size: 22px; }
    .fondo {
      background: linear-gradient(#fff 0%, #fff 100%);
      padding: 20px;
      max-width: 297mm;
      margin: 0 auto;
      min-height: 210mm;
    }
    .fila { display: flex; gap: 8px; margin-bottom: 10px; }
    .img-box { flex: 1; border: 1px solid #ccc; border-radius: 4px; overflow: hidden; background: #f5f5f5; }
    .img-box img { width: 100%; height: 140px; object-fit: cover; display: block; }
    .label { text-align: center; padding: 4px; font-size: 11px; font-weight: bold; color: #333; }
    h2 { font-size: 15px; margin: 10px 0; color: #444; border-bottom: 1px solid #ccc; padding-bottom: 4px; }
  </style>
</head>
<body>
  <div class="fondo">
    <h1>Paisajes Urbanos y Rurales</h1>
    <h2>Paisajes Urbanos</h2>
    <div class="fila">
      <div class="img-box">
        <img src="https://images.pexels.com/photos/10675259/pexels-photo-10675259.jpeg?auto=compress&cs=tinysrgb&w=400&h=200&fit=crop" alt="Paisaje Urbano 1">
        <div class="label">Skyline Ciudad</div>
      </div>
      <div class="img-box">
        <img src="https://images.pexels.com/photos/29090309/pexels-photo-29090309.jpeg?auto=compress&cs=tinysrgb&w=400&h=200&fit=crop" alt="Paisaje Urbano 2">
        <div class="label">Vista Aerea</div>
      </div>
      <div class="img-box">
        <img src="https://images.pexels.com/photos/22469237/pexels-photo-22469237.jpeg?auto=compress&cs=tinysrgb&w=400&h=200&fit=crop" alt="Paisaje Urbano 3">
        <div class="label">Ciudad Mexico</div>
      </div>
      <div class="img-box">
        <img src="https://images.pexels.com/photos/14578278/pexels-photo-14578278.jpeg?auto=compress&cs=tinysrgb&w=400&h=200&fit=crop" alt="Paisaje Urbano 4">
        <div class="label">Vista Nocturna</div>
      </div>
    </div>
    <h2>Paisajes Rurales</h2>
    <div class="fila">
      <div class="img-box">
        <img src="https://images.pexels.com/photos/17552922/pexels-photo-17552922.jpeg?auto=compress&cs=tinysrgb&w=400&h=200&fit=crop" alt="Paisaje Rural 1">
        <div class="label">Campo Verano</div>
      </div>
      <div class="img-box">
        <img src="https://images.pexels.com/photos/33432589/pexels-photo-33432589.jpeg?auto=compress&cs=tinysrgb&w=400&h=200&fit=crop" alt="Paisaje Rural 2">
        <div class="label">Granero Rural</div>
      </div>
      <div class="img-box">
        <img src="https://images.pexels.com/photos/37328218/pexels-photo-37328218.jpeg?auto=compress&cs=tinysrgb&w=400&h=200&fit=crop" alt="Paisaje Rural 3">
        <div class="label">Casas de Campo</div>
      </div>
      <div class="img-box">
        <img src="https://images.pexels.com/photos/5341960/pexels-photo-5341960.jpeg?auto=compress&cs=tinysrgb&w=400&h=200&fit=crop" alt="Paisaje Rural 4">
        <div class="label">Campo Trigo</div>
      </div>
    </div>
  </div>
</body>
</html>
